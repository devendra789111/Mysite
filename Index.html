<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education - Smart Attendance</title>
    <style>
        :root {
            --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; 
            --warning: #f39c12; --info: #2980b9; --bg: #f4f7f6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .dashboard { width: 100%; max-width: 1000px; background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .clock { text-align: center; font-size: 16px; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
        
        /* Geo-fence Tracker Banner */
        #trackingBanner { display: none; padding: 10px; text-align: center; font-weight: bold; color: white; border-radius: 8px; margin-bottom: 20px; transition: 0.3s;}
        .in-zone { background-color: var(--success); }
        .out-zone { background-color: var(--danger); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .form-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; flex: 1; font-size: 15px; outline: none;}
        input:focus { border-color: var(--info); }
        
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 12px; margin-bottom: 25px; }
        button { padding: 12px; font-size: 15px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:disabled { opacity: 0.5; cursor: not-allowed; }
        .btn-in { background: var(--success); } .btn-out { background: var(--danger); }
        .btn-leave { background: var(--warning); color: black; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 20px; min-width: 800px; }
        .table-wrap { overflow-x: auto; }
        th, td { padding: 12px; text-align: center; border: 1px solid #ecf0f1; font-size: 14px; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .photo-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; cursor: pointer; }

        /* Modals (Camera & Leave) */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        .modal h3 { margin-top: 0; }
        
        video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 15px; transform: scaleX(-1); }
        .btn-capture { background: var(--info); width: 100%; margin-bottom: 10px; }
        .btn-cancel { background: #7f8c8d; width: 100%; }
        
        .leave-input { width: 100%; margin-bottom: 15px; }
        .notice-text { color: var(--danger); font-size: 13px; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>🏢 Quality Education App</h2>
    <div class="clock" id="clock">00:00:00</div>

    <div id="trackingBanner" class="in-zone">
        📍 Location Tracking Active...
    </div>

    <div class="form-group">
        <input type="text" id="empName" placeholder="👤 Your Name" required>
        <input type="text" id="empId" placeholder="🔢 Employee ID" required>
    </div>

    <div class="btn-grid">
        <button class="btn-in" onclick="startProcess('Punch In')">📸 📍 Punch In</button>
        <button class="btn-out" onclick="startProcess('Punch Out')">📸 🛑 Punch Out</button>
        <button class="btn-leave" onclick="openLeaveModal()">📝 Apply Leave</button>
    </div>

    <div class="table-wrap">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>ID & Name</th>
                    <th>Status</th>
                    <th>Punch In</th>
                    <th>Punch Out</th>
                    <th>Out of 50m Range</th>
                    <th>Net Work Hours</th>
                    <th>Photos</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>
</div>

<div class="modal-overlay" id="cameraModal">
    <div class="modal">
        <h3 id="cameraTitle">Take Selfie</h3>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="btn-capture" id="captureBtn">📸 Capture & Submit</button>
        <button class="btn-cancel" onclick="closeCamera()">❌ Cancel</button>
    </div>
</div>

<div class="modal-overlay" id="leaveModal">
    <div class="modal">
        <h3>Apply for Leave</h3>
        <input type="date" id="leaveDate" class="leave-input">
        <input type="text" id="leaveReason" class="leave-input" placeholder="Reason for leave...">
        <button class="btn-capture" onclick="submitLeave()">✅ Submit Leave</button>
        <button class="btn-cancel" onclick="document.getElementById('leaveModal').style.display='none'">❌ Cancel</button>
    </div>
</div>

<script>
    let attendanceData = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
    let currentAction = ""; 
    let watchId = null;
    let outOfZoneStartMs = 0; // 50 मीटर से बाहर जाने का समय

    // Live Clock
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleString('en-IN');
    }, 1000);

    window.onload = () => {
        renderTable();
        resumeTrackingIfPunchedIn();
    };

    // --- 1. LEAVE LOGIC (Date & Reason) ---
    function openLeaveModal() {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        if (!name || !id) return alert("⚠️ पहले अपना Name और ID दर्ज करें!");
        document.getElementById('leaveModal').style.display = 'flex';
    }

    function submitLeave() {
        const date = document.getElementById('leaveDate').value;
        const reason = document.getElementById('leaveReason').value.trim();
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();

        if(!date || !reason) return alert("तारीख और कारण (Reason) डालना अनिवार्य है!");

        // Format Date to DD/MM/YYYY
        const dateParts = date.split('-');
        const formattedDate = `${dateParts[2]}/${dateParts[1]}/${dateParts[0]}`;

        let existingRecord = attendanceData.find(r => r.id === id && r.date === formattedDate);
        if(existingRecord) return alert("इस तारीख का रिकॉर्ड पहले ही मौजूद है!");

        attendanceData.push({
            date: formattedDate, id, name, status: 'Leave', reason: reason,
            punchIn: '-', punchOut: '-', totalHours: '-', outOfZonePenalty: 0, photos: {}
        });

        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
        document.getElementById('leaveModal').style.display = 'none';
        renderTable();
        alert(`✅ ${formattedDate} के लिए छुट्टी का आवेदन भेज दिया गया है।`);
    }

    // --- 2. CAMERA & PROCESS LOGIC (Selfie) ---
    function startProcess(action) {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        if (!name || !id) return alert("⚠️ पहले अपना Name और ID दर्ज करें!");

        const date = new Date().toLocaleDateString('en-GB');
        let record = attendanceData.find(r => r.id === id && r.date === date);

        if (action === 'Punch In' && record) return alert("❌ आप आज पहले ही Punch In कर चुके हैं!");
        if (action === 'Punch Out') {
            if (!record || record.status !== 'Present') return alert("❌ पहले Punch In करें!");
            if (record.punchOut !== '-') return alert("❌ आप Punch Out कर चुके हैं!");
        }

        currentAction = action;
        document.getElementById('cameraTitle').innerText = `${action} - Take Selfie`;
        document.getElementById('cameraModal').style.display = 'flex';
        
        // Start Camera
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => {
                alert("⚠️ कैमरा एक्सेस अनिवार्य है! कृपया ब्राउज़र में कैमरा Allow करें।");
                closeCamera();
            });
    }

    function closeCamera() {
        const video = document.getElementById('video');
        if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        document.getElementById('cameraModal').style.display = 'none';
    }

    document.getElementById('captureBtn').onclick = () => {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth;
        canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        // मिरर इमेज ठीक करने के लिए
        ctx.translate(canvas.width, 0);
        ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.5); // Image compression
        closeCamera();
        
        // फोटो क्लिक होने के तुरंत बाद लोकेशन चेक करो
        getLocationAndMarkAttendance(photoData);
    };

    // --- 3. LOCATION & GEOFENCE LOGIC (50 Meters strict) ---
    function getLocationAndMarkAttendance(photoBase64) {
        if (!navigator.geolocation) return alert("आपके डिवाइस में लोकेशन सपोर्ट नहीं है!");

        navigator.geolocation.getCurrentPosition(
            (pos) => {
                const lat = pos.coords.latitude;
                const lon = pos.coords.longitude;
                saveAttendance(lat, lon, photoBase64);
            },
            (err) => { alert("⚠️ लोकेशन अनिवार्य है! बिना लोकेशन के हाजिरी नहीं लगेगी।"); },
            { enableHighAccuracy: true }
        );
    }

    // Haversine Formula: दो लोकेशन के बीच की दूरी (मीटर में)
    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; // Earth radius in meters
        const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad;
        const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function saveAttendance(lat, lon, photoBase64) {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        const date = new Date().toLocaleDateString('en-GB');
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { hour12: true });
        const rawTimeMs = now.getTime();

        let record = attendanceData.find(r => r.id === id && r.date === date);

        if (currentAction === 'Punch In') {
            attendanceData.push({
                date, id, name, status: 'Present',
                punchIn: timeString, punchInMs: rawTimeMs, punchOut: '-', punchOutMs: 0,
                punchInLat: lat, punchInLon: lon, // ऑफिस की फिक्स लोकेशन
                outOfZonePenaltyMs: 0, totalHours: '-',
                photos: { in: photoBase64 }
            });
            alert("✅ Punch In & Selfie Saved! अब आपकी लोकेशन ट्रैक हो रही है।");
            startGeofencing(id, date, lat, lon); // ट्रैकिंग शुरू
        } 
        else if (currentAction === 'Punch Out') {
            // अगर बाहर था तो आउट-ऑफ़-ज़ोन का बचा हुआ समय जोड़ो
            if (outOfZoneStartMs > 0) {
                record.outOfZonePenaltyMs += (now.getTime() - outOfZoneStartMs);
                outOfZoneStartMs = 0;
            }

            record.punchOut = timeString;
            record.punchOutMs = rawTimeMs;
            record.photos.out = photoBase64;
            
            // काम के घंटे कैलकुलेट करना (कुल समय - 50m के बाहर बिताया समय)
            let grossMs = record.punchOutMs - record.punchInMs;
            let netMs = grossMs - record.outOfZonePenaltyMs;
            if(netMs < 0) netMs = 0;

            record.totalHours = formatMs(netMs);
            
            // ट्रैकिंग बंद करो
            if(watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('trackingBanner').style.display = 'none';

            let msg = "🛑 Punch Out Successful!";
            if(record.outOfZonePenaltyMs > 60000) { // अगर 1 मिनट से ज्यादा बाहर रहा
                msg += `\n⚠️ नोटिस: आप ${formatMs(record.outOfZonePenaltyMs)} समय तक 50 मीटर से बाहर थे, यह समय आपके वर्किंग ऑवर से काट लिया गया है।`;
            }
            alert(msg);
        }

        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
        renderTable();
    }

    // --- 4. CONTINUOUS TRACKING (Geofencing) ---
    function startGeofencing(empId, date, officeLat, officeLon) {
        const banner = document.getElementById('trackingBanner');
        banner.style.display = 'block';

        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const currentLat = pos.coords.latitude;
                const currentLon = pos.coords.longitude;
                const distance = getDistance(officeLat, officeLon, currentLat, currentLon);
                
                let record = attendanceData.find(r => r.id === empId && r.date === date);
                if(!record || record.punchOut !== '-') return;

                if (distance > 50) { // 50 मीटर से बाहर
                    banner.className = 'out-zone';
                    banner.innerText = `⚠️ चेतावनी! आप ऑफिस एरिया से ${Math.round(distance)}m दूर हैं। आपका वर्किंग टाइम काउंट नहीं हो रहा है।`;
                    if (outOfZoneStartMs === 0) {
                        outOfZoneStartMs = new Date().getTime(); // बाहर जाने का टाइमर स्टार्ट
                    }
                } else { // 50 मीटर के अंदर आ गया
                    banner.className = 'in-zone';
                    banner.innerText = `✅ आप 50 मीटर वर्किंग ज़ोन के अंदर हैं।`;
                    if (outOfZoneStartMs > 0) {
                        record.outOfZonePenaltyMs += (new Date().getTime() - outOfZoneStartMs);
                        outOfZoneStartMs = 0; // टाइमर रिसेट
                        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
                    }
                }
            },
            (err) => { console.warn("Live tracking issue:", err); },
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    // पेज रीलोड होने पर अगर कोई प्रेजेंट है तो उसकी ट्रैकिंग दोबारा चालू करना
    function resumeTrackingIfPunchedIn() {
        const date = new Date().toLocaleDateString('en-GB');
        const activeRecord = attendanceData.find(r => r.date === date && r.status === 'Present' && r.punchOut === '-');
        if(activeRecord) {
            startGeofencing(activeRecord.id, date, activeRecord.punchInLat, activeRecord.punchInLon);
        }
    }

    function formatMs(ms) {
        if (ms <= 0) return '0h 0m';
        const hrs = Math.floor(ms / (1000 * 60 * 60));
        const mins = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        return `${hrs}h ${mins}m`;
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 
        let reversedData = [...attendanceData].reverse();

        reversedData.forEach(row => {
            const tr = document.createElement('tr');
            
            // Photos HTML
            let photosHtml = '';
            if(row.photos && row.photos.in) photosHtml += `<img src="${row.photos.in}" class="photo-thumb" title="Punch In Selfie"> `;
            if(row.photos && row.photos.out) photosHtml += `<img src="${row.photos.out}" class="photo-thumb" title="Punch Out Selfie">`;

            // Penalty Formatting
            let penaltyStr = '-';
            if(row.outOfZonePenaltyMs > 0) {
                penaltyStr = `<span style="color:red;font-weight:bold;">-${formatMs(row.outOfZonePenaltyMs)}</span><br><span style="font-size:11px;color:#c0392b;">(Deducted)</span>`;
            }

            // Reason for Leave
            let statusHtml = `<strong>${row.status}</strong>`;
            if(row.status === 'Leave' && row.reason) statusHtml += `<br><span style="font-size:12px; color:#7f8c8d">Reason: ${row.reason}</span>`;

            tr.innerHTML = `
                <td><strong>${row.date}</strong></td>
                <td>${row.id}<br><small>${row.name}</small></td>
                <td>${statusHtml}</td>
                <td>${row.punchIn}</td>
                <td>${row.punchOut}</td>
                <td>${penaltyStr}</td>
                <td><strong style="color:var(--success)">${row.totalHours}</strong></td>
                <td>${photosHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }
</script>

</body>
</html>
