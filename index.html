<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education Attendance</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #eef2f3; margin: 0; padding: 20px; text-align: center; }
        .header { background: #1a237e; color: white; padding: 10px; border-radius: 8px; margin-bottom: 20px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .header h2 { margin: 5px 0; font-size: 22px; }
        .live-time { font-size: 16px; font-weight: bold; color: #ffeb3b; }
        .container { background: white; padding: 20px; border-radius: 10px; max-width: 1150px; margin: auto; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        .input-group { margin-bottom: 20px; background: #f5f5f5; padding: 15px; border-radius: 8px; border: 2px solid #ddd; }
        input[type="text"], input[type="password"] { padding: 12px; width: 30%; margin: 5px; border: 2px solid #1a237e; border-radius: 5px; font-size: 16px; font-weight: bold; text-align: center; }
        #empName { background-color: #e9ecef; cursor: not-allowed; }
        .btn-grid { display: flex; flex-wrap: wrap; justify-content: center; gap: 10px; margin-top: 10px; }
        button { padding: 10px 15px; font-size: 14px; font-weight: bold; border: none; border-radius: 6px; cursor: pointer; color: white; transition: 0.2s; position: relative; }
        button:hover { filter: brightness(0.9); }
        .btn-in { background-color: #4CAF50; } .btn-out { background-color: #f44336; } 
        .btn-train-start { background-color: #9C27B0; } .btn-train-end { background-color: #7B1FA2; }
        .btn-break-start { background-color: #FF9800; } .btn-break-end { background-color: #F57C00; }
        .btn-leave { background-color: #E91E63; } .btn-check-leave { background-color: #0288D1; margin-top: 10px; padding: 12px 20px; }
        
        /* TaskFlow Button Specific Style */
        .btn-task { background-color: #3F51B5; font-size: 16px; padding: 12px 25px; }
        .badge-count { background: red; color: white; border-radius: 50%; padding: 2px 7px; font-size: 12px; position: absolute; top: -5px; right: -5px; font-weight: bold; box-shadow: 0 0 5px rgba(0,0,0,0.5); animation: blinker 1s linear infinite; }

        /* Modals */
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background-color: rgba(0,0,0,0.8); justify-content: center; align-items: center; }
        .modal-content { background: white; padding: 20px; border-radius: 10px; text-align: left; width: 340px; box-shadow: 0 5px 15px rgba(0,0,0,0.3); }
        video { width: 100%; border-radius: 8px; border: 3px solid #1a237e; margin-bottom: 10px; }
        canvas { display: none; }
        
        /* Tables */
        #exportArea { margin-top: 20px; background: white; padding: 10px; }
        .report-header { display: none; text-align: center; font-size: 20px; margin-bottom: 15px; color: #1a237e; font-weight: bold; text-transform: uppercase; }
        #tableWrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th, td { border: 1px solid #ddd; padding: 6px; text-align: center; vertical-align: middle; }
        th { background-color: #1a237e; color: white; }
        .log-photo { width: 45px; height: 45px; border-radius: 4px; border: 1px solid #ccc; object-fit: cover; }

        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>

    <div class="header">
        <h2>🏢 Quality Education Attendance Kiosk</h2>
        <div id="liveDateTime" class="live-time">लोड हो रहा है...</div>
    </div>

    <div class="container">
        <div class="status-box" id="systemStatusBox" style="display:none; margin-bottom: 20px;">
            <span id="systemStatusText"></span>
        </div>

        <div class="input-group">
            <p style="margin: 0 0 10px 0; font-size: 14px; color: #555;">अपनी एम्प्लॉई ID दर्ज करें:</p>
            <input type="text" id="empId" placeholder="एम्प्लॉई ID दर्ज करें" oninput="autoFillName()">
            <input type="text" id="empName" placeholder="कर्मचारी का नाम" readonly><br>
            <button class="btn-check-leave" onclick="checkMyLeaveStatus()">👀 Check My Leave Status</button>
        </div>

        <div class="status-box" id="statusBox" style="display:none;">
            ज़ोन स्टेटस: <span id="geoText" style="color:#555;">लोकेशन जांची जा रही है...</span>
        </div>

        <div class="btn-grid">
            <button class="btn-in" onclick="initPunchIn()">Punch In</button>
            <button class="btn-out" onclick="initPunchOut()">Punch Out</button>
            <button class="btn-break-start" onclick="actionBtn('break')">Start Break ☕</button>
            <button class="btn-break-end" onclick="actionBtn('work')">End Break</button>
            <button class="btn-train-start" onclick="startTraining()">Start Training</button>
            <button class="btn-train-end" onclick="actionBtn('work')">End Training</button>
            <button class="btn-leave" onclick="openLeaveModal()">Mark Leave</button>
            <button class="btn-task" id="taskFlowBtn" onclick="openTaskModal()">📋 TaskFlow</button>
        </div>

        <div id="exportArea">
            <div class="report-header" id="pdfMonthHeader">Attendance Report</div>
            <div id="tableWrapper">
                <table id="attendanceTable">
                    <thead>
                        <tr>
                            <th>Date</th><th>ID</th><th>Name</th><th>Status</th><th>In Time</th><th>Out Time</th>
                            <th>Break Time</th><th>Train Time</th><th>Total Hrs</th>
                            <th>In Selfie</th><th>Out Selfie</th>
                        </tr>
                    </thead>
                    <tbody id="logTableBody">
                        <tr><td colspan="11" style="text-align:center;">डेटा लोड हो रहा है...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>

        <div class="export-btns">
            <button class="btn-pdf" onclick="downloadPDF()">Download PDF</button>
        </div>
    </div>

    <div id="taskModal" class="modal">
        <div class="modal-content" style="width: 90%; max-width: 400px; text-align: left;">
            <h3 style="color:#1a237e; text-align: center; margin-top:0;">📋 TaskFlow System</h3>
            <div style="display:flex; gap:5px; margin-bottom:15px;">
                <button style="flex:1; background:#4CAF50; font-size:12px; padding:8px;" onclick="switchTaskTab('incoming')">📥 Incoming</button>
                <button style="flex:1; background:#FF9800; font-size:12px; padding:8px;" onclick="switchTaskTab('outgoing')">📤 Outgoing</button>
                <button style="flex:1; background:#1a237e; font-size:12px; padding:8px;" onclick="switchTaskTab('create')">➕ New Task</button>
            </div>
            
            <div id="taskCreateSection" style="display:none;">
                <label style="font-weight:bold; font-size:13px;">Assign To (ID):</label><br>
                <input type="text" id="taskReceiverId" placeholder="QE101" style="width:90%; padding:8px; margin:5px 0;"><br>
                <label style="font-weight:bold; font-size:13px;">Task Details:</label><br>
                <textarea id="taskDesc" style="width:90%; height:60px; padding:8px; border:2px solid #1a237e; border-radius:5px; margin:5px 0;"></textarea><br>
                <div style="background:#e8f5e9; padding:8px; border:1px solid #4CAF50; border-radius:5px; margin-top:5px;">
                    <label style="font-weight:bold; font-size:12px; color:#2E7D32;">🔒 Task Password (Optional):</label>
                    <input type="password" id="taskSecurePass" placeholder="e.g. 1234" style="width:90%; padding:6px; margin-top:5px;">
                </div>
                <button style="width:100%; background:#1a237e; margin-top:10px; padding:10px;" onclick="sendNewTask()">🚀 Assign Task</button>
            </div>

            <div id="taskListSection" style="max-height:300px; overflow-y:auto; padding-right:5px;">
                <div id="taskContainer"></div>
            </div>
            <button style="width:100%; margin-top:15px; background:#aaa;" onclick="document.getElementById('taskModal').style.display='none';">Close</button>
        </div>
    </div>

    <script>
    // आपका परमानेंट SCRIPT_URL
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbw4QGYfqyPKpATDwqaFI9eArrH82GuqWBV7_q3PUbl1QiqcaD77wLt1HzojcouT--18Eg/exec";
    
    let ADMIN_PASS = "1234"; 
    let TRAIN_PASS = "0000";
    const WEEKLY_OFF_DAY = 1; // 1 = Monday
    const PUBLIC_HOLIDAYS = { "03/03/2026": "Holi", "04/03/2026": "Holi", "02/10/2026": "Gandhi Jayanti" };
    
    let EMP_LIST = JSON.parse(localStorage.getItem('cachedEmpList')) || {}; 
    let TODAY_SERVER_LOGS = {}; 
    let isSystemReady = false;  

    let myActiveLeaves = [];
    let stream = null; 
    let geoWatchId = null; 
    let pendingAction = ""; 
    let pendingId = ""; 
    let lastTick = Date.now(); 
    
    let now = new Date(); 
    let dd = String(now.getDate()).padStart(2, '0'); 
    let mm = String(now.getMonth() + 1).padStart(2, '0'); 
    let yyyy = now.getFullYear();
    let todayDateStr = `${dd}/${mm}/${yyyy}`; 
    let currentMonth = `${mm}/${yyyy}`; 

    let attendanceDb = JSON.parse(localStorage.getItem(`attDB_${todayDateStr}`)) || {};
    let deviceBaseLat = localStorage.getItem(`baseLat_${todayDateStr}`); 
    let deviceBaseLng = localStorage.getItem(`baseLng_${todayDateStr}`);
    let isDeviceWithin50m = false;

    let isWeeklyOff = (now.getDay() === WEEKLY_OFF_DAY);
    let holidayName = PUBLIC_HOLIDAYS[todayDateStr];
    let isHolidayOrOff = isWeeklyOff || holidayName;

    window.onload = async () => {
        updateDateTime(); 
        setInterval(updateDateTime, 1000); 
        checkTodayHoliday(); 
        renderTable(); 
        
        // पुराने पंच-इन को चेक करके GPS ट्रैकिंग शुरू करना
        if(Object.values(attendanceDb).some(emp => !emp.isPunchedOut) && deviceBaseLat && deviceBaseLng) { 
            isDeviceWithin50m = true; 
            document.getElementById("statusBox").style.display = "block";
            startDeviceGeoTracking(); 
        }
        
        startMasterTimer();
        fetchSystemData(); 
        setInterval(fetchSystemData, 45000); 
        setInterval(syncAllActiveUsers, 60000); 

        let todayIso = now.toISOString().split('T')[0];
        document.getElementById("leaveDateInput").setAttribute('min', todayIso);
        document.getElementById("leaveDateInput").value = todayIso;
    };

    // --- 1. SYSTEM SYNC & COMMAND CHECK ---
    async function fetchSystemData() {
        try {
            let pRes = await fetch(`${SCRIPT_URL}?action=getPasswords&nocache=${Date.now()}`);
            let pData = await pRes.json();
            if(pData.adminPass) ADMIN_PASS = String(pData.adminPass).trim();
            if(pData.trainPass) TRAIN_PASS = String(pData.trainPass).trim();

            let eRes = await fetch(`${SCRIPT_URL}?action=getEmployees&nocache=${Date.now()}`);
            let fetchedList = await eRes.json();
            if(Object.keys(fetchedList).length > 0) {
                EMP_LIST = fetchedList; 
                localStorage.setItem('cachedEmpList', JSON.stringify(EMP_LIST)); 
                autoFillName();
            }

            let tRes = await fetch(`${SCRIPT_URL}?action=getTodayLogs&date=${todayDateStr}&nocache=${Date.now()}`);
            TODAY_SERVER_LOGS = await tRes.json(); 
            
            let isUpdated = false;
            let activeId = document.getElementById("empId").value.trim();

            for(let id in attendanceDb) {
                if(TODAY_SERVER_LOGS[id]) {
                    if(TODAY_SERVER_LOGS[id].exceptionSecs) attendanceDb[id].exceptionSecs = TODAY_SERVER_LOGS[id].exceptionSecs;
                    if(TODAY_SERVER_LOGS[id].outByAdmin && !attendanceDb[id].isPunchedOut) {
                        attendanceDb[id].isPunchedOut = true; 
                        attendanceDb[id].mode = "out";
                        attendanceDb[id].outTime = TODAY_SERVER_LOGS[id].outTime; 
                        attendanceDb[id].outByAdmin = true;
                        isUpdated = true;
                    }
                }
            }

            // Task Notification Check (बटन पर नंबर दिखाना)
            if(activeId && EMP_LIST[activeId]) {
                checkTaskBadge(activeId);
            }

            if(isUpdated) { saveData(); renderTable(); }
            isSystemReady = true; 
        } catch(e) {}
    }

    // --- 2. GPS & CAMERA LOGIC (Original 50m) ---
    function calculateDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; 
        const dLat = (lat2-lat1)*Math.PI/180; 
        const dLon = (lon2-lon1)*Math.PI/180;
        const a = Math.sin(dLat/2)*Math.sin(dLat/2) + Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)*Math.sin(dLon/2);
        return R*2*Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
    }

    function startDeviceGeoTracking() {
        if(navigator.geolocation) {
            geoWatchId = navigator.geolocation.watchPosition((pos) => {
                let dist = calculateDistance(deviceBaseLat, deviceBaseLng, pos.coords.latitude, pos.coords.longitude);
                let gt = document.getElementById("geoText"); 
                let sBox = document.getElementById("statusBox");
                if(dist <= 50) { 
                    isDeviceWithin50m = true; 
                    sBox.style.background = "#e8f5e9"; 
                    gt.innerHTML = `<span style="color:green; font-weight:bold;">✅ ऑफिस ज़ोन के अंदर (${Math.round(dist)}m)</span>`;
                } else { 
                    isDeviceWithin50m = false; 
                    sBox.style.background = "#ffebee"; 
                    gt.innerHTML = `<span style="color:red; font-weight:bold;">❌ ज़ोन से बाहर (${Math.round(dist)}m)! टाइमर रुका है।</span>`;
                }
            }, null, { enableHighAccuracy: true, timeout: 20000, maximumAge: 5000 });
        }
    }

    // --- 3. MASTER TIMER (1 Second Accuracy) ---
    function startMasterTimer() {
        setInterval(() => {
            let nowTick = Date.now(); 
            let delta = Math.round((nowTick - lastTick) / 1000); 
            if (delta > 0) {
                let updated = false;
                for(let id in attendanceDb) {
                    let emp = attendanceDb[id]; 
                    if(emp.isPunchedOut) continue; 
                    if(emp.mode === "work" && isDeviceWithin50m) { emp.workSecs += delta; updated = true; }
                    else if(emp.mode === "break") { emp.breakSecs += delta; updated = true; }
                    else if(emp.mode === "train") { emp.trainSecs += delta; updated = true; }
                }
                lastTick = nowTick; 
                if(updated){ saveData(); renderTable(); }
            }
        }, 1000);
    }
        </script>

    <script>
    // --- 4. 📋 TASKFLOW SYSTEM (NEW FEATURE) ---
    let currentTaskTab = 'incoming';

    async function openTaskModal() {
        let id = document.getElementById("empId").value.trim();
        if(!id || !EMP_LIST[id]) return alert("कृपया पहले अपनी सही ID दर्ज करें!");
        document.getElementById('taskModal').style.display = 'flex';
        switchTaskTab('incoming');
    }

    function switchTaskTab(tab) {
        currentTaskTab = tab;
        document.getElementById('taskCreateSection').style.display = (tab === 'create') ? 'block' : 'none';
        document.getElementById('taskListSection').style.display = (tab === 'create') ? 'none' : 'block';
        if(tab !== 'create') fetchTasks();
    }

    async function fetchTasks() {
        let id = document.getElementById("empId").value.trim();
        let container = document.getElementById('taskContainer');
        container.innerHTML = "<p style='text-align:center;'>लोड हो रहा है...</p>";
        
        try {
            let res = await fetch(`${SCRIPT_URL}?action=getMyTasks&empId=${id}&nocache=${Date.now()}`);
            let tasks = await res.json();
            let html = "";
            
            let filtered = tasks.filter(t => currentTaskTab === 'incoming' ? t.receiverId === id : t.senderId === id);
            
            if(filtered.length === 0) html = "<p style='text-align:center; color:#999;'>कोई टास्क नहीं मिला।</p>";

            filtered.sort((a,b) => b.timestamp - a.timestamp).forEach(t => {
                let statusColor = t.status === 'Closed' ? '#4CAF50' : (t.status === 'Rejected' ? '#f44336' : '#FF9800');
                let isSecure = t.password && t.password !== "";
                
                html += `
                <div style="border:1px solid #ddd; padding:10px; margin-bottom:10px; border-radius:8px; background:#f9f9f9; border-left:5px solid ${statusColor};">
                    <div style="display:flex; justify-content:space-between; font-size:11px; color:#666;">
                        <span>🆔 ${t.taskId}</span> <span>📅 ${t.date}</span>
                    </div>
                    <p style="margin:5px 0; font-weight:bold; color:#333;">${t.description}</p>
                    <div style="font-size:12px; margin-bottom:5px;">
                        ${currentTaskTab==='incoming' ? 'From: <b>'+t.senderName+'</b>' : 'To: <b>'+t.receiverName+'</b>'} | Status: <b style="color:${statusColor}">${t.status}</b>
                    </div>
                    ${currentTaskTab === 'incoming' && t.status === 'Pending' ? `
                        <div style="display:flex; gap:5px; margin-top:8px;">
                            <button style="flex:1; background:#4CAF50; padding:5px; font-size:11px;" onclick="handleTask('${t.taskId}', 'Closed', ${isSecure})">✅ Complete</button>
                            <button style="flex:1; background:#f44336; padding:5px; font-size:11px;" onclick="handleTask('${t.taskId}', 'Rejected', ${isSecure})">❌ Reject</button>
                        </div>
                    ` : ''}
                    ${t.penalty > 0 ? `<div style="color:red; font-size:11px; font-weight:bold; margin-top:5px;">⚠️ Penalty applied: ₹${t.penalty}</div>` : ''}
                </div>`;
            });
            container.innerHTML = html;
        } catch(e) { container.innerHTML = "डाटा लोड करने में त्रुटि!"; }
    }

    async function sendNewTask() {
        let senderId = document.getElementById("empId").value.trim();
        let receiverId = document.getElementById("taskReceiverId").value.trim().toUpperCase();
        let desc = document.getElementById("taskDesc").value.trim();
        let pass = document.getElementById("taskSecurePass").value.trim();

        if(!receiverId || !desc) return alert("Receiver ID और Details भरें!");
        if(!EMP_LIST[receiverId]) return alert("Receiver ID गलत है!");

        let payload = {
            action: "sendTask",
            senderId: senderId,
            senderName: EMP_LIST[senderId].name,
            receiverId: receiverId,
            receiverName: EMP_LIST[receiverId].name,
            description: desc,
            password: pass,
            date: todayDateStr,
            timestamp: Date.now()
        };

        let res = await fetch(SCRIPT_URL, { method: "POST", body: JSON.stringify(payload) });
        alert("✅ टास्क भेज दिया गया है!");
        document.getElementById("taskReceiverId").value = "";
        document.getElementById("taskDesc").value = "";
        document.getElementById("taskSecurePass").value = "";
        switchTaskTab('outgoing');
    }

    async function handleTask(taskId, newStatus, isSecure) {
        let enteredPass = "";
        if(isSecure) {
            enteredPass = prompt("🔐 यह टास्क पासवर्ड प्रोटेक्टेड है। पासवर्ड डालें:");
            if(!enteredPass) return;
        }
        
        let res = await fetch(SCRIPT_URL, { 
            method: "POST", 
            body: JSON.stringify({ 
                action: "updateTask", 
                taskId: taskId, 
                status: newStatus, 
                password: enteredPass,
                empId: document.getElementById("empId").value.trim()
            }) 
        });
        let out = await res.json();
        if(out.status === "error") alert("❌ " + out.message);
        else { alert("✅ टास्क अपडेट कर दिया गया!"); fetchTasks(); checkTaskBadge(document.getElementById("empId").value.trim()); }
    }

    async function checkTaskBadge(id) {
        try {
            let res = await fetch(`${SCRIPT_URL}?action=getMyTasks&empId=${id}&nocache=${Date.now()}`);
            let tasks = await res.json();
            let pendingCount = tasks.filter(t => t.receiverId === id && t.status === 'Pending').length;
            let btn = document.getElementById("taskFlowBtn");
            if(pendingCount > 0) {
                btn.innerHTML = `📋 TaskFlow <span class="badge-count">${pendingCount}</span>`;
            } else {
                btn.innerHTML = `📋 TaskFlow`;
            }
        } catch(e) {}
    }

    // --- 5. HELPER FUNCTIONS & EXPORTS ---
    function downloadExcel() {
        alert("Excel रिपोर्ट डाउनलोड करने के लिए कृपया Admin Panel का उपयोग करें।");
    }

    function updateDateTime() {
        let now = new Date();
        document.getElementById('liveDateTime').innerText = now.toLocaleString('hi-IN', { 
            weekday: 'long', year: 'numeric', month: 'long', day: 'numeric', 
            hour: '2-digit', minute:'2-digit', second:'2-digit' 
        });
    }

    function saveData() {
        localStorage.setItem(`attDB_${todayDateStr}`, JSON.stringify(attendanceDb));
    }

    function checkTodayHoliday() {
        if(isHolidayOrOff) {
            document.getElementById('systemStatusBox').style.display="block";
            document.getElementById('systemStatusText').innerText = `🛑 System Notice: Today is ${holidayName || 'Weekly Off'}.`;
        }
    }
</script>
</body>
</html>
