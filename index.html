<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education - Smart Attendance</title>
    <style>
        :root {
            --primary: #2c3e50; --success: #27ae60; --danger: #c0392b; 
            --warning: #f39c12; --info: #2980b9; --break: #e67e22; --bg: #f4f7f6;
        }
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; }
        
        .dashboard { width: 100%; max-width: 1100px; background: white; border-radius: 12px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); }
        h2 { text-align: center; color: var(--primary); margin-bottom: 5px; }
        .clock { text-align: center; font-size: 16px; color: #7f8c8d; margin-bottom: 20px; font-weight: bold; }
        
        /* Geo-fence Tracker Banner */
        #trackingBanner { display: none; padding: 10px; text-align: center; font-weight: bold; color: white; border-radius: 8px; margin-bottom: 20px; transition: 0.3s;}
        .in-zone { background-color: var(--success); }
        .out-zone { background-color: var(--danger); animation: blink 1.5s infinite; }
        @keyframes blink { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .form-group { display: flex; gap: 15px; margin-bottom: 20px; flex-wrap: wrap; }
        input { padding: 12px; border: 1px solid #bdc3c7; border-radius: 6px; flex: 1; font-size: 15px; outline: none;}
        input:focus { border-color: var(--info); }
        
        .btn-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(130px, 1fr)); gap: 10px; margin-bottom: 20px; }
        button { padding: 12px 10px; font-size: 14px; font-weight: bold; color: white; border: none; border-radius: 6px; cursor: pointer; transition: 0.3s; }
        button:active { transform: scale(0.98); }
        
        .btn-in { background: var(--success); } .btn-in:hover { background: #219653; }
        .btn-b-start { background: var(--break); } .btn-b-start:hover { background: #d35400; }
        .btn-b-end { background: #8e44ad; } .btn-b-end:hover { background: #732d91; }
        .btn-out { background: var(--danger); } .btn-out:hover { background: #a93226; }
        .btn-leave { background: var(--warning); color: black; } .btn-leave:hover { background: #f1c40f; }
        .btn-export { background: var(--primary); width: 100%; margin-top: 15px; font-size: 16px; padding: 15px;}
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 900px; }
        .table-wrap { overflow-x: auto; }
        th, td { padding: 12px; text-align: center; border: 1px solid #ecf0f1; font-size: 14px; }
        th { background: var(--primary); color: white; }
        tr:nth-child(even) { background: #f9f9f9; }
        .photo-thumb { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; border: 2px solid #ddd; }

        /* Camera Modal */
        .modal-overlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); z-index: 1000; justify-content: center; align-items: center; }
        .modal { background: white; padding: 25px; border-radius: 12px; width: 90%; max-width: 400px; text-align: center; }
        video { width: 100%; border-radius: 8px; background: #000; margin-bottom: 15px; transform: scaleX(-1); }
        .btn-capture { background: var(--info); width: 100%; margin-bottom: 10px; }
        .btn-cancel { background: #7f8c8d; width: 100%; }
        
        .badge { padding: 4px 8px; border-radius: 12px; font-size: 11px; font-weight: bold; color: white; display: inline-block; margin-top: 5px;}
        .bg-on-break { background: var(--break); }
    </style>
</head>
<body>

<div class="dashboard">
    <h2>🏢 Quality Education App</h2>
    <div class="clock" id="clock">00:00:00</div>

    <div id="trackingBanner" class="in-zone">📍 Location Tracking Active...</div>

    <div class="form-group">
        <input type="text" id="empName" placeholder="👤 Your Name" required>
        <input type="text" id="empId" placeholder="🔢 Employee ID" required>
    </div>

    <div class="btn-grid">
        <button class="btn-in" onclick="startProcess('Punch In')">📸 Punch In</button>
        <button class="btn-b-start" onclick="markBreak('Start')">☕ Start Break</button>
        <button class="btn-b-end" onclick="markBreak('End')">✅ End Break</button>
        <button class="btn-leave" onclick="markLeave()">📝 Mark Leave</button>
        <button class="btn-out" onclick="startProcess('Punch Out')">📸 Punch Out</button>
    </div>

    <div class="table-wrap">
        <table id="attendanceTable">
            <thead>
                <tr>
                    <th>Date</th>
                    <th>ID & Name</th>
                    <th>Status</th>
                    <th>Punch In</th>
                    <th>Total Break</th>
                    <th>Punch Out</th>
                    <th>Net Work Hours</th>
                    <th>Photos</th>
                </tr>
            </thead>
            <tbody id="tableBody"></tbody>
        </table>
    </div>

    <button class="btn-export" onclick="downloadSecureExcel()">🔒 Download Data as Excel (Password Required)</button>
</div>

<div class="modal-overlay" id="cameraModal">
    <div class="modal">
        <h3 id="cameraTitle">Take Selfie</h3>
        <video id="video" autoplay playsinline></video>
        <canvas id="canvas" style="display:none;"></canvas>
        <button class="btn-capture" id="captureBtn">📸 Capture & Submit</button>
        <button class="btn-cancel" onclick="closeCamera()">❌ Cancel</button>
    </div>
</div>

<script>
    let attendanceData = JSON.parse(localStorage.getItem('attendanceLogs')) || [];
    let currentAction = ""; 
    let watchId = null;
    let outOfZoneStartMs = 0;

    // Live Clock
    setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleString('en-IN'); }, 1000);
    window.onload = () => { renderTable(); resumeTrackingIfPunchedIn(); };

    // --- 1. DIRECT MARK LEAVE ---
    function markLeave() {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        if (!name || !id) return alert("⚠️ Pehle apna Name aur ID darj karein!");

        const date = new Date().toLocaleDateString('en-GB');
        let existingRecord = attendanceData.find(r => r.id === id && r.date === date);
        if(existingRecord) return alert("❌ Aaj ka record pehle hi maujood hai!");

        attendanceData.push({
            date, id, name, status: 'Leave', 
            punchIn: '-', punchOut: '-', totalBreakMs: 0, outOfZonePenaltyMs: 0, totalHours: '-', photos: {}
        });

        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
        renderTable();
        alert(`✅ Leave marked successfully for today!`);
    }

    // --- 2. BREAK LOGIC ---
    function markBreak(type) {
        const id = document.getElementById('empId').value.trim();
        if (!id) return alert("⚠️ Pehle Employee ID darj karein!");
        
        const date = new Date().toLocaleDateString('en-GB');
        let record = attendanceData.find(r => r.id === id && r.date === date);

        if (!record || record.status !== 'Present') return alert("❌ Pehle Punch In karein!");
        if (record.punchOut !== '-') return alert("❌ Aap Punch Out kar chuke hain!");

        const rawTimeMs = new Date().getTime();

        if (type === 'Start') {
            if (record.isOnBreak) return alert("❌ Aap pehle se hi break par hain!");
            record.isOnBreak = true;
            record.breakStartMs = rawTimeMs;
            alert("☕ Break Started!");
        } else if (type === 'End') {
            if (!record.isOnBreak) return alert("❌ Aap break par nahi hain!");
            record.isOnBreak = false;
            record.totalBreakMs = (record.totalBreakMs || 0) + (rawTimeMs - record.breakStartMs);
            alert("✅ Break Ended! Welcome back to work.");
        }
        
        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
        renderTable();
    }

    // --- 3. CAMERA & PROCESS LOGIC ---
    function startProcess(action) {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        if (!name || !id) return alert("⚠️ Pehle apna Name aur ID darj karein!");

        const date = new Date().toLocaleDateString('en-GB');
        let record = attendanceData.find(r => r.id === id && r.date === date);

        if (action === 'Punch In' && record) return alert("❌ Aap aaj pehle hi Punch In kar chuke hain!");
        if (action === 'Punch Out') {
            if (!record || record.status !== 'Present') return alert("❌ Pehle Punch In karein!");
            if (record.isOnBreak) return alert("⚠️ Pehle apna Break End karein!");
            if (record.punchOut !== '-') return alert("❌ Aap Punch Out kar chuke hain!");
        }

        currentAction = action;
        document.getElementById('cameraTitle').innerText = `${action} - Take Selfie`;
        document.getElementById('cameraModal').style.display = 'flex';
        
        navigator.mediaDevices.getUserMedia({ video: { facingMode: "user" } })
            .then(stream => { document.getElementById('video').srcObject = stream; })
            .catch(err => { alert("⚠️ Camera access is required!"); closeCamera(); });
    }

    function closeCamera() {
        const video = document.getElementById('video');
        if (video.srcObject) video.srcObject.getTracks().forEach(track => track.stop());
        document.getElementById('cameraModal').style.display = 'none';
    }

    document.getElementById('captureBtn').onclick = () => {
        const video = document.getElementById('video');
        const canvas = document.getElementById('canvas');
        canvas.width = video.videoWidth; canvas.height = video.videoHeight;
        const ctx = canvas.getContext('2d');
        ctx.translate(canvas.width, 0); ctx.scale(-1, 1);
        ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
        
        const photoData = canvas.toDataURL('image/jpeg', 0.4); 
        closeCamera();
        getLocationAndMarkAttendance(photoData);
    };

    // --- 4. LOCATION LOGIC ---
    function getLocationAndMarkAttendance(photoBase64) {
        if (!navigator.geolocation) return alert("Location not supported!");
        navigator.geolocation.getCurrentPosition(
            (pos) => { saveAttendance(pos.coords.latitude, pos.coords.longitude, photoBase64); },
            (err) => { alert("⚠️ Location is required for attendance!"); },
            { enableHighAccuracy: true }
        );
    }

    function getDistance(lat1, lon1, lat2, lon2) {
        const R = 6371e3; const rad = Math.PI / 180;
        const dLat = (lat2 - lat1) * rad; const dLon = (lon2 - lon1) * rad;
        const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * rad) * Math.cos(lat2 * rad) * Math.sin(dLon/2) * Math.sin(dLon/2);
        return R * (2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a)));
    }

    function saveAttendance(lat, lon, photoBase64) {
        const name = document.getElementById('empName').value.trim();
        const id = document.getElementById('empId').value.trim();
        const date = new Date().toLocaleDateString('en-GB');
        const now = new Date();
        const timeString = now.toLocaleTimeString('en-US', { hour12: true });
        const rawTimeMs = now.getTime();

        let record = attendanceData.find(r => r.id === id && r.date === date);

        if (currentAction === 'Punch In') {
            attendanceData.push({
                date, id, name, status: 'Present',
                punchIn: timeString, punchInMs: rawTimeMs, punchOut: '-', punchOutMs: 0,
                punchInLat: lat, punchInLon: lon, totalBreakMs: 0, isOnBreak: false,
                outOfZonePenaltyMs: 0, totalHours: '-', photos: { in: photoBase64 }
            });
            alert("✅ Punch In Successful! Live tracking started.");
            startGeofencing(id, date, lat, lon);
        } 
        else if (currentAction === 'Punch Out') {
            if (outOfZoneStartMs > 0) {
                record.outOfZonePenaltyMs += (now.getTime() - outOfZoneStartMs);
                outOfZoneStartMs = 0;
            }

            record.punchOut = timeString;
            record.punchOutMs = rawTimeMs;
            record.photos.out = photoBase64;
            
            // Net Hours = Total Time - Break Time - Out of Zone Time
            let grossMs = record.punchOutMs - record.punchInMs;
            let netMs = grossMs - (record.totalBreakMs || 0) - (record.outOfZonePenaltyMs || 0);
            if(netMs < 0) netMs = 0;

            record.totalHours = formatMs(netMs);
            if(watchId) navigator.geolocation.clearWatch(watchId);
            document.getElementById('trackingBanner').style.display = 'none';

            let msg = "🛑 Punch Out Successful!";
            if(record.outOfZonePenaltyMs > 60000) { 
                msg += `\n⚠️ Notice: Aap 50m range se bahar the, wo time deduct kar liya gaya hai.`;
            }
            alert(msg);
        }

        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
        renderTable();
    }

    function startGeofencing(empId, date, officeLat, officeLon) {
        const banner = document.getElementById('trackingBanner');
        banner.style.display = 'block';

        watchId = navigator.geolocation.watchPosition(
            (pos) => {
                const currentLat = pos.coords.latitude; const currentLon = pos.coords.longitude;
                const distance = getDistance(officeLat, officeLon, currentLat, currentLon);
                let record = attendanceData.find(r => r.id === empId && r.date === date);
                if(!record || record.punchOut !== '-') return;

                if (distance > 50) { 
                    banner.className = 'out-zone';
                    banner.innerText = `⚠️ Alert! You are ${Math.round(distance)}m away. Working time not counting!`;
                    if (outOfZoneStartMs === 0) outOfZoneStartMs = new Date().getTime();
                } else { 
                    banner.className = 'in-zone';
                    banner.innerText = `✅ You are within the 50m working zone.`;
                    if (outOfZoneStartMs > 0) {
                        record.outOfZonePenaltyMs += (new Date().getTime() - outOfZoneStartMs);
                        outOfZoneStartMs = 0; 
                        localStorage.setItem('attendanceLogs', JSON.stringify(attendanceData));
                    }
                }
            },
            (err) => { console.warn("Live tracking issue:", err); },
            { enableHighAccuracy: true, maximumAge: 0 }
        );
    }

    function resumeTrackingIfPunchedIn() {
        const date = new Date().toLocaleDateString('en-GB');
        const activeRecord = attendanceData.find(r => r.date === date && r.status === 'Present' && r.punchOut === '-');
        if(activeRecord) startGeofencing(activeRecord.id, date, activeRecord.punchInLat, activeRecord.punchInLon);
    }

    function formatMs(ms) {
        if (ms <= 0) return '0h 0m';
        const hrs = Math.floor(ms / (1000 * 60 * 60));
        const mins = Math.floor((ms % (1000 * 60 * 60)) / (1000 * 60));
        return `${hrs}h ${mins}m`;
    }

    function renderTable() {
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = ''; 
        let reversedData = [...attendanceData].reverse();

        reversedData.forEach(row => {
            const tr = document.createElement('tr');
            
            let photosHtml = '';
            if(row.photos && row.photos.in) photosHtml += `<img src="${row.photos.in}" class="photo-thumb"> `;
            if(row.photos && row.photos.out) photosHtml += `<img src="${row.photos.out}" class="photo-thumb">`;

            let statusHtml = `<strong>${row.status}</strong>`;
            if(row.isOnBreak) statusHtml += `<br><span class="badge bg-on-break">On Break</span>`;

            tr.innerHTML = `
                <td><strong>${row.date}</strong></td>
                <td>${row.id}<br><small>${row.name}</small></td>
                <td>${statusHtml}</td>
                <td>${row.punchIn}</td>
                <td>${formatMs(row.totalBreakMs || 0)}</td>
                <td>${row.punchOut}</td>
                <td><strong style="color:var(--success)">${row.totalHours}</strong></td>
                <td>${photosHtml}</td>
            `;
            tbody.appendChild(tr);
        });
    }

    // --- 5. SECURE EXCEL DOWNLOAD ---
    function downloadSecureExcel() {
        const password = prompt("🔒 Excel Data download karne ke liye Admin Password enter karein:");
        
        // Default password '1234' rakha hai (Aap badal sakte hain)
        if (password === "1234") {
            let csv = [];
            let rows = document.querySelectorAll("#attendanceTable tr");
            
            for (let i = 0; i < rows.length; i++) {
                let row = [], cols = rows[i].querySelectorAll("td, th");
                for (let j = 0; j < cols.length - 1; j++) { // Last 'Photos' column Excel mein nahi aayega
                    let text = cols[j].innerText.replace(/(\r\n|\n|\r)/gm, " ");
                    row.push('"' + text + '"'); 
                }
                csv.push(row.join(","));
            }

            let csvFile = new Blob([csv.join("\n")], {type: "text/csv;charset=utf-8;"});
            let downloadLink = document.createElement("a");
            downloadLink.download = "Secure_Attendance_Data.csv";
            downloadLink.href = window.URL.createObjectURL(csvFile);
            downloadLink.style.display = "none";
            document.body.appendChild(downloadLink);
            downloadLink.click();
            document.body.removeChild(downloadLink);
            alert("✅ Data Download ho gaya hai! Excel mein open karne ke baad aap isme 'Protect Sheet' feature ka use karke isko completely lock kar sakte hain.");
        } else if (password !== null) {
            alert("❌ Password Galat Hai! Download Cancelled.");
        }
    }
</script>

</body>
</html>
