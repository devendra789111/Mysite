<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecaller Panel</title>
    <style>
        * { box-sizing: border-box; font-family: 'Segoe UI', sans-serif; }
        body { margin: 0; background: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 15px; }
        .screen { width: 100%; max-width: 650px; display: none; flex-direction: column; }
        .active-screen { display: flex; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .header { display: flex; justify-content: space-between; align-items: center; background: #007bff; color: white; padding: 15px 20px; border-radius: 10px; margin-bottom: 20px;}
        input, select, textarea { width: 100%; padding: 12px; border: 1px solid #ced4da; border-radius: 6px; margin-bottom: 15px; }
        button { background: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #0056b3; }
        .btn-green { background: #28a745; width: auto; } .btn-green:hover { background: #218838; }
        .btn-red { background: #dc3545; width: auto; }
        
        /* Modal for WhatsApp */
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 10px; width: 90%; max-width: 400px; text-align: center; }
        .msg-list { text-align: left; max-height: 250px; overflow-y: auto; margin-bottom: 15px; }
        .msg-item { padding: 10px; background: #f8f9fa; border: 1px solid #ddd; margin-bottom: 5px; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .msg-item:hover { background: #e9ecef; border-color: #007bff; }
        
        .history-card { background: #f8f9fa; border-left: 4px solid #007bff; padding: 12px; margin-bottom: 10px; font-size: 0.9em; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="card" style="margin-top: 10vh; text-align: center;">
            <h2 style="color: #007bff; margin-top: 0;">Employee Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button onclick="login()">Login to CRM</button>
        </div>
    </div>

    <div id="employee-screen" class="screen">
        <div class="header">
            <h3 style="margin: 0;">📞 Telecaller</h3>
            <div>
                <button class="btn-green" onclick="openWhatsAppModal()">💬 WhatsApp</button>
                <button class="btn-red" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-top: 0; border-bottom: 2px solid #f0f0f0; padding-bottom: 12px;">Add Call Entry</h3>
            
            <label><b>Mobile Number</b></label>
            <input type="number" id="emp-mobile" onblur="fetchMobileHistory()" placeholder="10-digit mobile number">
            
            <div id="history-box" style="display:none; margin-bottom: 15px;"></div>

            <input type="text" id="emp-name" placeholder="Student Name">
            <select id="emp-problem">
                <option value="" disabled selected>Select an issue category...</option>
                <option value="Online Course Related">Online Course Related</option>
                <option value="Online Test Series Related">Online Test Series Related</option>
                <option value="Offline Test Series Related">Offline Test Series Related</option>
                <option value="Notes Related">Notes Related</option>
                <option value="App Feedback">App Feedback</option>
                <option value="Teacher Feedback">Teacher Feedback</option>
                <option value="Others">Others</option>
            </select>
            <textarea id="emp-issue" rows="3" placeholder="Describe the problem..."></textarea>
            <textarea id="emp-response" rows="3" placeholder="Your response/solution..."></textarea>
            <button onclick="submitCallEntry()">Submit Entry</button>
        </div>
    </div>

    <div id="wa-modal" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0;">Send WhatsApp Message</h3>
            
            <div id="step-1">
                <p style="font-size:0.9em; color:#666;">Select a message template:</p>
                <div class="msg-list" id="wa-msg-list">Loading messages...</div>
                <button class="btn-red" onclick="closeModal()">Close</button>
            </div>

            <div id="step-2" style="display:none;">
                <p style="font-size:0.9em; color:#007bff; font-weight:bold;" id="selected-msg-title"></p>
                <input type="number" id="wa-mobile" placeholder="Enter Student Mobile No.">
                <button class="btn-green" onclick="sendWhatsAppFinal()">🚀 Send to WhatsApp</button>
                <button class="btn-red" style="margin-top:10px;" onclick="document.getElementById('step-1').style.display='block'; document.getElementById('step-2').style.display='none';">Back</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyI9FRnm9GUhhjKY7Er__pdONW4FqSSc7LBdVQ6MHTSqndwBowM8Krl36Nj12l1-F0tjA/exec"; 
        let currentUser = null;
        let selectedMessageContent = "";

        window.onload = () => { if (localStorage.getItem("qei_user")) { currentUser = JSON.parse(localStorage.getItem("qei_user")); showScreen("employee-screen"); } };

        async function apiCall(payload) { try { const r = await fetch(API_URL, { method: 'POST', body: JSON.stringify(payload) }); return await r.json(); } catch { return { success: false }; } }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s => s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }

        async function login() {
            const u = document.getElementById("login-username").value, p = document.getElementById("login-password").value;
            const res = await apiCall({ action: "login", username: u, password: p });
            if (res.success) { currentUser = res.user; localStorage.setItem("qei_user", JSON.stringify(currentUser)); showScreen("employee-screen"); } else alert("Invalid Login");
        }
        function logout() { localStorage.removeItem("qei_user"); location.reload(); }

        async function fetchMobileHistory() {
            const mobile = document.getElementById("emp-mobile").value;
            if (mobile.length < 10) return;
            const histBox = document.getElementById("history-box"); histBox.style.display = "block"; histBox.innerHTML = "<i>Searching history...</i>";
            const res = await apiCall({ action: "fetchMobileInfo", mobile: mobile });
            
            if (res.success && res.history.length > 0) {
                document.getElementById("emp-name").value = res.lastRecord.studentName;
                histBox.innerHTML = res.history.slice().reverse().slice(0,2).map(r => `
                    <div class="history-card">
                        <b>${new Date(r.date).toLocaleDateString()}</b> - <span style="color:${r.status=='Pending'?'red':'green'}">${r.status}</span><br>
                        ${r.issue}<br><b>Admin:</b> ${r.adminComment||'Wait...'}
                    </div>`).join('');
            } else { histBox.innerHTML = "<span style='color:green'>New Student!</span>"; }
        }

        async function submitCallEntry() {
            const m = document.getElementById("emp-mobile").value, n = document.getElementById("emp-name").value, p = document.getElementById("emp-problem").value, i = document.getElementById("emp-issue").value, r = document.getElementById("emp-response").value;
            if(!m || !n || !p || !i) return alert("Fill mandatory fields");
            await apiCall({ action: "addComplaint", data: {mobile: m, studentName: n, problemType: p, issue: i, employeeResponse: r, employeeId: currentUser.employeeId} });
            alert("Saved!"); location.reload();
        }

        // --- WHATSAPP MODAL LOGIC ---
        async function openWhatsAppModal() {
            document.getElementById('wa-modal').style.display = 'flex';
            document.getElementById('step-1').style.display = 'block';
            document.getElementById('step-2').style.display = 'none';
            
            const res = await apiCall({ action: "getMessages" });
            if(res.success && res.messages.length > 0) {
                document.getElementById('wa-msg-list').innerHTML = res.messages.map(m => `
                    <div class="msg-item" onclick="selectMessage('${m.title}', \`${m.content}\`)">📄 ${m.title}</div>
                `).join('');
            } else {
                document.getElementById('wa-msg-list').innerHTML = "No templates created by admin yet.";
            }
        }

        function closeModal() { document.getElementById('wa-modal').style.display = 'none'; }

        function selectMessage(title, content) {
            selectedMessageContent = content;
            document.getElementById('selected-msg-title').innerText = "Sending: " + title;
            // Agar pehle se number dala hua hai to use fill kar do
            document.getElementById('wa-mobile').value = document.getElementById('emp-mobile').value;
            
            document.getElementById('step-1').style.display = 'none';
            document.getElementById('step-2').style.display = 'block';
        }

        function sendWhatsAppFinal() {
            const number = document.getElementById('wa-mobile').value;
            if(number.length < 10) return alert("Enter valid 10 digit number");
            
            // Format number (adds 91 if not present)
            let finalNumber = number.length === 10 ? "91" + number : number;
            
            // Encode message for URL
            let encodedMsg = encodeURIComponent(selectedMessageContent);
            
            // Open WhatsApp
            window.open(`https://wa.me/${finalNumber}?text=${encodedMsg}`, '_blank');
            closeModal();
        }
    </script>
</body>
</html>
