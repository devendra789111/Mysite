<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quality Education - Telecaller Workspace</title>
    <style>
        /* ================= PREMIUM GLASSMORPHISM UI ================= */
        @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');
        * { box-sizing: border-box; font-family: 'Poppins', sans-serif; }
        body { margin: 0; padding: 0; background: linear-gradient(135deg, #a1c4fd 0%, #c2e9fb 100%); background-attachment: fixed; color: #2c3e50; min-height: 100vh; }
        
        .screen { display: none; flex-direction: column; align-items: center; padding: 15px; width: 100%; animation: fadeIn 0.4s ease; }
        .active-screen { display: flex; }
        
        .glass-panel { background: rgba(255, 255, 255, 0.55); backdrop-filter: blur(15px); border: 1px solid rgba(255, 255, 255, 0.5); border-radius: 15px; box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.1); padding: 20px; margin-bottom: 20px; width: 100%; max-width: 800px; }
        
        /* Navbar & Tabs */
        .header { display: flex; justify-content: space-between; align-items: center; background: rgba(255, 255, 255, 0.8); border-bottom: 1px solid rgba(255,255,255,0.5); padding: 15px 20px; border-radius: 12px; margin-bottom: 15px; width: 100%; max-width: 800px; }
        .tab-menu { display: flex; gap: 10px; width: 100%; max-width: 800px; margin-bottom: 15px; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: rgba(255,255,255,0.6); color: #1e3c72; border: 1px solid rgba(255,255,255,0.8); padding: 10px 15px; font-weight: 600; cursor: pointer; border-radius: 8px; transition: 0.3s; white-space: nowrap; flex:1; text-align: center; }
        .tab-btn.active { background: #007bff; color: white; border-color: #007bff; box-shadow: 0 4px 10px rgba(0, 123, 255, 0.3); }

        .tab-content { display: none; width: 100%; max-width: 800px; } .tab-content.active { display: block; animation: fadeIn 0.4s; }

        input, select, textarea { width: 100%; padding: 12px; border: 1px solid rgba(255,255,255,0.8); border-radius: 8px; font-size: 0.95em; outline: none; background: rgba(255, 255, 255, 0.8); margin-bottom: 15px; }
        input:focus, select:focus, textarea:focus { background: #fff; border-color: #007bff; }
        
        button { border: none; padding: 12px 20px; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; }
        .btn-primary { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; width: 100%; }
        .btn-success { background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%); color: white; }
        .btn-danger { background: linear-gradient(135deg, #ff0844 0%, #ffb199 100%); color: white; }
        
        /* History & Lists */
        .history-card { background: rgba(255, 255, 255, 0.7); border-left: 4px solid #0984e3; padding: 15px; margin-bottom: 10px; border-radius: 6px; font-size: 0.9em; }
        table { width: 100%; border-collapse: collapse; background: rgba(255,255,255,0.6); border-radius: 8px; overflow: hidden; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid rgba(255,255,255,0.5); }
        th { background: rgba(255,255,255,0.8); color: #1e3c72; }

        .toast { padding: 12px; border-radius: 8px; margin-top: 15px; text-align: center; font-weight: 600; display: none; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div id="login-screen" class="screen active-screen">
        <div class="glass-panel" style="max-width: 400px; margin: 10vh auto; text-align: center;">
            <div style="font-size: 3em; margin-bottom: 10px;">🎧</div>
            <h2 style="color: #1e3c72; margin-top: 0;">Employee Login</h2>
            <input type="text" id="login-username" placeholder="Username">
            <input type="password" id="login-password" placeholder="Password">
            <button class="btn-primary" onclick="login()">Login 🚀</button>
            <div id="login-msg" class="toast"></div>
        </div>
    </div>

    <div id="employee-screen" class="screen">
        <div class="header">
            <h3 style="margin: 0; color: #1e3c72;">🎓 Workspace</h3>
            <div style="display: flex; gap: 10px; align-items: center;">
                <span id="emp-name-display" style="font-weight:bold; color:#0984e3;">👤 Hi, User</span>
                <button class="btn-danger" style="padding: 6px 12px;" onclick="logout()">Logout</button>
            </div>
        </div>

        <div class="tab-menu">
            <button class="tab-btn active" onclick="switchTab('tab-entry')">📝 Add Entry</button>
            <button class="tab-btn" onclick="switchTab('tab-calls')">📞 My Calls <span id="calls-badge" style="background:red;color:white;padding:2px 6px;border-radius:10px;font-size:0.8em;display:none;"></span></button>
            <button class="tab-btn" onclick="switchTab('tab-books')">📚 Books Info</button>
            <button class="tab-btn" onclick="switchTab('tab-whatsapp')">💬 WhatsApp</button>
        </div>
        
        <div id="tab-entry" class="tab-content active">
            <div class="glass-panel">
                <label>Mobile Number</label>
                <input type="number" id="emp-mobile" onblur="fetchHistory()" placeholder="10-digit mobile number">
                
                <div id="history-box" style="display:none; margin-bottom:15px; max-height:300px; overflow-y:auto;"></div>

                <label>Student Name</label>
                <input type="text" id="emp-name" placeholder="Student Name">

                <label>Problem Type</label>
                <select id="emp-problem">
                    <option value="" disabled selected>📂 Select category...</option>
                    <option value="Online Course Related">Online Course Related</option>
                    <option value="Online Test Series Related">Test Series Related</option>
                    <option value="Offline Test Series Related">Offline Test Series</option>
                    <option value="Notes Related">Notes Related</option>
                    <option value="Others">Others</option>
                </select>

                <label>Issue Details</label>
                <textarea id="emp-issue" placeholder="Describe problem..."></textarea>
                <label>Your Response</label>
                <textarea id="emp-response" placeholder="What solution did you provide?"></textarea>

                <button id="submit-btn" class="btn-primary" onclick="submitEntry()">Submit Entry ✅</button>
                <div id="form-msg" class="toast"></div>
            </div>
        </div>

        <div id="tab-calls" class="tab-content">
            <div class="glass-panel">
                <h3 style="color:#1e3c72; margin-top:0;">📞 Leads Assigned By Admin</h3>
                <div id="assigned-calls-list">Loading...</div>
            </div>
        </div>

        <div id="tab-books" class="tab-content">
            <div class="glass-panel" style="overflow-x:auto;">
                <h3 style="color:#1e3c72; margin-top:0;">📚 Inventory & Pricing</h3>
                <table id="books-table">
                    <thead><tr><th>Book Name</th><th>Price</th><th>Del. Charge</th><th>Stock Status</th><th>Website</th></tr></thead>
                    <tbody></tbody>
                </table>
            </div>
        </div>

        <div id="tab-whatsapp" class="tab-content">
            <div class="glass-panel">
                <h3 style="color:#1e3c72; margin-top:0;">💬 Send Message</h3>
                <label>Student Mobile Number</label>
                <div style="display:flex; gap:10px;">
                    <input type="number" id="wa-mobile" placeholder="Mobile Number" style="margin-bottom:0;">
                    <button class="btn-primary" style="width:auto; padding:10px 15px;" onclick="document.getElementById('wa-mobile').value = document.getElementById('emp-mobile').value">Get from Form</button>
                </div>
                
                <h4 style="color:#1e3c72; margin-bottom:5px;">Select Template to Send:</h4>
                <div id="templates-list" style="max-height: 200px; overflow-y:auto; border:1px solid rgba(255,255,255,0.8); border-radius:8px; padding:10px; background:rgba(255,255,255,0.4); margin-bottom:20px;"></div>

                <hr style="border:1px solid rgba(255,255,255,0.3); margin:20px 0;">

                <h3 style="color:#1e3c72; margin-top:0;">📝 Create My Own Template</h3>
                <input type="text" id="my-temp-title" placeholder="Template Name">
                <textarea id="my-temp-content" rows="3" placeholder="Write your custom message..."></textarea>
                <button class="btn-success" style="width:100%" onclick="saveMyTemplate()">Save My Template</button>
            </div>
        </div>

    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbyI9FRnm9GUhhjKY7Er__pdONW4FqSSc7LBdVQ6MHTSqndwBowM8Krl36Nj12l1-F0tjA/exec"; 
        let currentUser = null, empData = {};

        window.onload = () => { if(localStorage.getItem("qei_user")) { currentUser = JSON.parse(localStorage.getItem("qei_user")); showScreen("employee-screen"); document.getElementById("emp-name-display").innerText = "👤 Hi, " + currentUser.name; loadDashboardData(); } };

        async function apiCall(p) { try { const r = await fetch(API_URL, {method:'POST', body:JSON.stringify(p)}); return await r.json(); } catch { return {success:false}; } }
        function showScreen(id) { document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active-screen')); document.getElementById(id).classList.add('active-screen'); }
        function switchTab(id) { document.querySelectorAll('.tab-content').forEach(t=>t.classList.remove('active')); document.querySelectorAll('.tab-btn').forEach(b=>b.classList.remove('active')); document.getElementById(id).classList.add('active'); event.target.classList.add('active'); }

        async function login() {
            const u=document.getElementById("login-username").value, p=document.getElementById("login-password").value;
            const res = await apiCall({action:"login", username:u, password:p});
            if(res.success){ currentUser=res.user; localStorage.setItem("qei_user", JSON.stringify(currentUser)); location.reload(); } else alert("Invalid Login");
        }
        function logout() { localStorage.removeItem("qei_user"); location.reload(); }

        async function loadDashboardData() {
            const res = await apiCall({action: "getEmpDashboardData", empId: currentUser.employeeId});
            if(res.success) {
                empData = res;
                // Render Books
                document.querySelector("#books-table tbody").innerHTML = res.books.map(b=>`<tr><td><b>${b.name}</b></td><td>₹${b.price}</td><td>₹${b.delivery}</td><td style="color:${b.stock=='In Stock'?'green':'red'}"><b>${b.stock}</b></td><td><a href="${b.website}" target="_blank">View</a></td></tr>`).join('');
                
                // Render Assigned Calls
                const pendingCalls = res.assignedCalls.filter(c=>c.status==='Pending');
                if(pendingCalls.length>0){ document.getElementById("calls-badge").innerText = pendingCalls.length; document.getElementById("calls-badge").style.display = "inline-block"; }
                
                if(pendingCalls.length===0) document.getElementById("assigned-calls-list").innerHTML = "<div style='padding:20px; text-align:center; color:green;'>🎉 Great! No pending calls.</div>";
                else document.getElementById("assigned-calls-list").innerHTML = pendingCalls.map(c=>`
                    <div class="history-card" style="border-color:#1e3c72; background:rgba(255,255,255,0.8);">
                        <div style="display:flex; justify-content:space-between; margin-bottom:5px;"><b>${c.name}</b> <span style="color:#007bff; font-weight:bold;">📞 ${c.number}</span></div>
                        <div style="color:#555; font-size:0.9em; margin-bottom:10px;"><b>Reason:</b> ${c.title}</div>
                        <div style="display:flex; gap:10px;">
                            <button class="btn-success" style="padding:6px; flex:1;" onclick="window.open('tel:${c.number}')">Call Now</button>
                            <button class="btn-primary" style="padding:6px; flex:1;" onclick="startEntryFromCall('${c.name}', '${c.number}')">Make Entry</button>
                            <button class="btn-danger" style="padding:6px; flex:1;" onclick="markDone('${c.callId}')">Mark Done</button>
                        </div>
                    </div>`).join('');

                // Render Templates
                let tmplHTML = `<div style="color:gray;font-size:0.8em;margin-bottom:5px;">Admin Templates</div>`;
                res.adminMsgs.forEach(m => tmplHTML += `<div style="padding:10px; background:#fff; margin-bottom:5px; border-radius:5px; cursor:pointer; border:1px solid #ddd;" onclick="sendWA(\`${m.content}\`)">📄 ${m.title}</div>`);
                tmplHTML += `<div style="color:gray;font-size:0.8em;margin:10px 0 5px 0;">My Templates</div>`;
                res.myMsgs.forEach(m => tmplHTML += `<div style="display:flex; gap:5px; margin-bottom:5px;"><div style="flex:1; padding:10px; background:#eef; border-radius:5px; cursor:pointer;" onclick="sendWA(\`${m.content}\`)">📄 ${m.title}</div><button class="btn-danger" style="padding:5px 10px;" onclick="delMyTemp('${m.tempId}')">🗑️</button></div>`);
                document.getElementById("templates-list").innerHTML = tmplHTML;
            }
        }

        function startEntryFromCall(name, number) {
            document.getElementById("emp-mobile").value = number; document.getElementById("emp-name").value = name;
            switchTab('tab-entry'); fetchHistory();
        }
        async function markDone(id) { await apiCall({action:"markCallDone", callId:id}); loadDashboardData(); }

        // ADD ENTRY & HISTORY
        async function fetchHistory() {
            const m = document.getElementById("emp-mobile").value; const hBox = document.getElementById("history-box");
            if(m.length<10){ hBox.style.display="none"; return; }
            hBox.style.display="block"; hBox.innerHTML = "<i>Searching...</i>";
            const res = await apiCall({action:"fetchMobileInfo", mobile:m});
            if(res.success && res.history.length>0) {
                document.getElementById("emp-name").value = res.lastRecord.studentName;
                hBox.innerHTML = res.history.slice().reverse().map(r=>`
                    <div class="history-card" style="border-left-color:${r.status=='Pending'?'red':'green'}">
                        <div style="display:flex;justify-content:space-between;border-bottom:1px solid #ddd;padding-bottom:5px;margin-bottom:5px;"><b>${new Date(r.date).toLocaleDateString()}</b><b style="color:${r.status=='Pending'?'red':'green'}">${r.status}</b></div>
                        <div><b>Issue:</b> ${r.issue}</div>
                        <div style="color:#0984e3; margin:5px 0;"><b>Your Reply:</b> ${r.employeeResponse}</div>
                        <div style="background:#fff; padding:5px; border-radius:4px;"><b>👨‍💼 Admin:</b> ${r.adminComment||'Wait...'}</div>
                    </div>`).join('');
            } else { hBox.innerHTML = "<span style='color:green;font-weight:bold;'>✅ New Student!</span>"; }
        }

        async function submitEntry() {
            const btn=document.getElementById("submit-btn"); const m=document.getElementById("emp-mobile").value, n=document.getElementById("emp-name").value, p=document.getElementById("emp-problem").value, i=document.getElementById("emp-issue").value, r=document.getElementById("emp-response").value;
            if(!m||!n||!p||!i) return alert("Fill mandatory fields");
            btn.disabled=true; btn.innerText="Saving...";
            const res = await apiCall({action:"addComplaint", data:{mobile:m, studentName:n, problemType:p, issue:i, employeeResponse:r, employeeId:currentUser.employeeId}});
            if(res.success){ alert("Saved Successfully!"); document.getElementById("emp-mobile").value=""; document.getElementById("emp-name").value=""; document.getElementById("emp-issue").value=""; document.getElementById("emp-response").value=""; document.getElementById("history-box").style.display="none"; }
            btn.disabled=false; btn.innerText="Submit Entry ✅";
        }

        // WHATSAPP & CUSTOM TEMPLATES
        function sendWA(content) {
            const num = document.getElementById("wa-mobile").value;
            if(num.length < 10) return alert("Enter student mobile number first!");
            window.open(`https://wa.me/91${num}?text=${encodeURIComponent(content)}`, '_blank');
        }
        async function saveMyTemplate() {
            const t=document.getElementById("my-temp-title").value, c=document.getElementById("my-temp-content").value;
            if(!t||!c) return alert("Fill template details");
            await apiCall({action:"saveEmpTemplate", template:{employeeId:currentUser.employeeId, title:t, content:c}});
            document.getElementById("my-temp-title").value=""; document.getElementById("my-temp-content").value=""; loadDashboardData();
        }
        async function delMyTemp(id) { if(confirm("Delete your template?")){ await apiCall({action:"deleteEmpTemplate", tempId:id}); loadDashboardData(); } }
    </script>
</body>
</html>
