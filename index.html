<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telecaller Panel - Quality Education CRM</title>
    <style>
        /* ================= CSS STYLING ================= */
        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { margin: 0; padding: 0; background-color: #f4f6f9; color: #333; display: flex; flex-direction: column; align-items: center; padding: 20px; }
        
        .screen { width: 100%; max-width: 600px; display: flex; flex-direction: column; align-items: center; }
        .hidden { display: none !important; }
        .error { color: red; font-size: 0.9em; text-align: center; }
        
        /* Cards */
        .card { background: white; padding: 25px; border-radius: 8px; box-shadow: 0 4px 8px rgba(0,0,0,0.1); width: 100%; margin-bottom: 20px; }
        
        /* Header */
        .header { display: flex; justify-content: space-between; align-items: center; width: 100%; margin-bottom: 20px; background: #007bff; color: white; padding: 15px 20px; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1);}
        .header h2 { margin: 0; font-size: 1.2em; }
        
        /* Inputs & Buttons */
        label { font-weight: bold; font-size: 0.9em; color: #555; display: block; margin-top: 15px; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 12px; margin-bottom: 5px; border: 1px solid #ccc; border-radius: 4px; font-size: 1em; }
        textarea { resize: vertical; min-height: 80px; }
        
        button { background-color: #007bff; color: white; border: none; padding: 12px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; font-size: 1em; margin-top: 15px; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #999; cursor: not-allowed; }
        
        .logout-btn { background-color: #dc3545; width: auto; padding: 8px 15px; margin-top: 0; }
        .logout-btn:hover { background-color: #c82333; }

        /* History Box */
        .history-box { background: #eef; padding: 15px; border-left: 4px solid #007bff; margin-top: 5px; margin-bottom: 15px; font-size: 0.9em; border-radius: 0 4px 4px 0; }
    </style>
</head>
<body>

    <div id="login-screen" class="screen">
        <div class="card" style="max-width: 400px; margin-top: 50px;">
            <h2 style="text-align: center; color: #007bff;">Employee Login</h2>
            <label>Username</label>
            <input type="text" id="login-username" placeholder="Enter username">
            
            <label>Password</label>
            <input type="password" id="login-password" placeholder="Enter password">
            
            <button onclick="login()">Login</button>
            <p id="login-msg" class="error"></p>
        </div>
    </div>

    <div id="employee-screen" class="screen hidden">
        <div class="header">
            <h2>📞 Telecaller Panel</h2>
            <div>
                <span id="emp-name-display" style="margin-right: 15px; font-weight: bold;"></span>
                <button class="logout-btn" onclick="logout()">Logout</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-top: 0; color: #333; border-bottom: 2px solid #eee; padding-bottom: 10px;">Add New Call Entry</h3>
            
            <label>Mobile Number (Search History)</label>
            <input type="number" id="emp-mobile" onblur="fetchMobileHistory()" placeholder="Enter 10-digit mobile number">
            <small style="color: gray; display: block; margin-bottom: 10px;">* Type number and click outside the box to auto-search past complaints.</small>
            
            <div id="history-box" class="history-box hidden"></div>

            <label>Student Name</label>
            <input type="text" id="emp-name" placeholder="Enter Student Name">

            <label>Problem Type</label>
            <select id="emp-problem">
                <option value="Online Course Related">Online Course Related</option>
                <option value="Online Test Series Related">Online Test Series Related</option>
                <option value="Offline Test Series Related">Offline Test Series Related</option>
                <option value="Notes Related">Notes Related</option>
                <option value="App Feedback">App Feedback</option>
                <option value="Teacher Feedback">Teacher Feedback</option>
                <option value="Others">Others</option>
            </select>

            <label>Issue Details</label>
            <textarea id="emp-issue" placeholder="Describe the student's problem in detail..."></textarea>

            <label>Employee Response</label>
            <textarea id="emp-response" placeholder="What solution or timeline did you provide?"></textarea>

            <button id="submit-btn" onclick="submitCallEntry()">Submit Entry</button>
        </div>
    </div>

    <script>
        // 🛑 IMPORTANT: PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE
        const API_URL = "https://script.google.com/macros/s/AKfycbyI9FRnm9GUhhjKY7Er__pdONW4FqSSc7LBdVQ6MHTSqndwBowM8Krl36Nj12l1-F0tjA/exec"; 
        
        let currentUser = null;

        // Check if user is already logged in on page load
        window.onload = () => {
            const savedUser = localStorage.getItem("qei_user");
            if (savedUser) {
                currentUser = JSON.parse(savedUser);
                showEmployeeScreen();
            }
        };

        // --- API HELPER ---
        async function apiCall(payload) {
            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify(payload)
                });
                return await response.json();
            } catch (err) {
                console.error(err);
                return { success: false, message: "Network error. Please check your internet or URL." };
            }
        }

        // --- LOGIN & LOGOUT ---
        async function login() {
            const user = document.getElementById("login-username").value;
            const pass = document.getElementById("login-password").value;
            const msgBox = document.getElementById("login-msg");
            const btn = document.querySelector("#login-screen button");
            
            if(!user || !pass) {
                msgBox.innerText = "Please enter both username and password.";
                return;
            }

            msgBox.style.color = "blue";
            msgBox.innerText = "Logging in please wait...";
            btn.disabled = true;

            const res = await apiCall({ action: "login", username: user, password: pass });
            
            if (res.success) {
                currentUser = res.user;
                localStorage.setItem("qei_user", JSON.stringify(currentUser));
                showEmployeeScreen();
            } else {
                msgBox.style.color = "red";
                msgBox.innerText = res.message || "Invalid credentials!";
            }
            btn.disabled = false;
        }

        function logout() {
            localStorage.removeItem("qei_user");
            currentUser = null;
            document.getElementById("employee-screen").classList.add("hidden");
            document.getElementById("login-screen").classList.remove("hidden");
            document.getElementById("login-msg").innerText = "";
            document.getElementById("login-username").value = "";
            document.getElementById("login-password").value = "";
        }

        function showEmployeeScreen() {
            document.getElementById("login-screen").classList.add("hidden");
            document.getElementById("employee-screen").classList.remove("hidden");
            document.getElementById("emp-name-display").innerText = "Hi, " + currentUser.name;
        }

        // --- FETCH PAST COMPLAINT HISTORY ---
        async function fetchMobileHistory() {
            const mobile = document.getElementById("emp-mobile").value;
            const histBox = document.getElementById("history-box");
            
            if (mobile.length < 10) {
                histBox.classList.add("hidden");
                return;
            }

            histBox.classList.remove("hidden");
            histBox.innerHTML = "<em>Searching past records...</em>";

            const res = await apiCall({ action: "fetchMobileInfo", mobile: mobile });
            
            if (res.success && res.lastRecord) {
                document.getElementById("emp-name").value = res.lastRecord.studentName;
                
                let statusColor = res.lastRecord.status === "Pending" ? "red" : "green";
                histBox.innerHTML = `
                    <div style="margin-bottom:5px;"><strong>Last Issue:</strong> ${res.lastRecord.issue}</div>
                    <div style="margin-bottom:5px;"><strong>Status:</strong> <span style="color:${statusColor}; font-weight:bold;">${res.lastRecord.status}</span></div>
                    <div><strong>Admin Reply:</strong> ${res.lastRecord.adminComment || 'No reply yet'}</div>
                `;
            } else {
                histBox.innerHTML = "<span style='color:green;'>No past complaints found. This is a new student.</span>";
            }
        }

        // --- SUBMIT NEW COMPLAINT ---
        async function submitCallEntry() {
            const mobile = document.getElementById("emp-mobile").value;
            const name = document.getElementById("emp-name").value;
            const issue = document.getElementById("emp-issue").value;
            const btn = document.getElementById("submit-btn");

            if(!mobile || !name || !issue) {
                alert("Please fill Mobile, Name and Issue Details!");
                return;
            }

            btn.disabled = true;
            btn.innerText = "Saving Data...";

            const data = {
                mobile: mobile,
                studentName: name,
                problemType: document.getElementById("emp-problem").value,
                issue: issue,
                employeeResponse: document.getElementById("emp-response").value,
                employeeId: currentUser.employeeId
            };

            const res = await apiCall({ action: "addComplaint", data: data });
            
            if (res.success) {
                alert("Call Entry Saved Successfully!");
                // Clear Form
                document.getElementById("emp-mobile").value = "";
                document.getElementById("emp-name").value = "";
                document.getElementById("emp-issue").value = "";
                document.getElementById("emp-response").value = "";
                document.getElementById("history-box").classList.add("hidden");
                document.getElementById("emp-problem").selectedIndex = 0;
            } else {
                alert("Error saving data. Please try again.");
            }
            
            btn.disabled = false;
            btn.innerText = "Submit Entry";
        }
    </script>
</body>
</html>
